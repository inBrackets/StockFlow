server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /users/ {
        proxy_pass http://api-gateway:8080;
    }

    location /portfolio/ {
        proxy_pass http://api-gateway:8080;
    }

    location /market/ {
        proxy_pass http://api-gateway:8080;
    }
}

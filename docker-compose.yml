x-rp-common: &rp-common-environment
  RP_DB_HOST: rp-postgres
  RP_DB_PORT: 5432
  RP_DB_USER: rpuser
  RP_DB_PASS: rppass
  RP_DB_NAME: reportportal
  RP_AMQP_HOST: rp-rabbitmq
  RP_AMQP_PORT: 5672
  RP_AMQP_APIPORT: 15672
  RP_AMQP_USER: rabbitmq
  RP_AMQP_PASS: rabbitmq
  RP_AMQP_APIUSER: rabbitmq
  RP_AMQP_APIPASS: rabbitmq
  RP_AMQP_ANALYZER-VHOST: analyzer
  DATASTORE_TYPE: filesystem

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api-gateway:
    build: ./api-gateway
    ports:
      - "8085:8080"
    depends_on:
      - user-service
      - portfolio-service
      - market-service

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/users_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  portfolio-service:
    build: ./portfolio-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/portfolio_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  market-service:
    build: ./market-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/market_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "9090:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  stockflow-ui:
    build: ./stockflow-ui
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

  ## ReportPortal Infrastructure
  rp-gateway:
    image: traefik:v2.11.32
    ports:
      - "8086:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --providers.docker=true
      - --providers.docker.constraints=Label(`traefik.expose`, `true`)
      - --entrypoints.web.address=:8080
      - --entrypoints.traefik.address=:8081
      - --api.dashboard=true
      - --api.insecure=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/http/routers || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - reportportal
    restart: always

  rp-postgres:
    image: bitnamilegacy/postgresql:17.5.0-debian-12-r20
    environment:
      POSTGRES_USER: rpuser
      POSTGRES_PASSWORD: rppass
      POSTGRES_DB: reportportal
    volumes:
      - rp_postgres:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 120s
      retries: 10
    networks:
      - reportportal
    restart: always

  rp-rabbitmq:
    image: bitnamilegacy/rabbitmq:4.1.2-debian-12-r1
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
      RABBITMQ_MANAGEMENT_ALLOW_WEB_ACCESS: "true"
      RABBITMQ_PLUGINS: >
        rabbitmq_consistent_hash_exchange
        rabbitmq_management
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - reportportal
    restart: always

  ## ReportPortal Core Services
  rp-migrations:
    image: reportportal/migrations:5.15.0
    depends_on:
      rp-postgres:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: rp-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: reportportal
      POSTGRES_USER: rpuser
      POSTGRES_PASSWORD: rppass
    networks:
      - reportportal
    restart: on-failure

  rp-index:
    image: reportportal/service-index:5.15.0
    depends_on:
      rp-gateway:
        condition: service_started
    environment:
      LB_URL: http://rp-gateway:8081
      TRAEFIK_V2_MODE: "true"
    labels:
      - "traefik.http.middlewares.index-redirect.redirectregex.regex=^(.*)/$$"
      - "traefik.http.middlewares.index-redirect.redirectregex.replacement=$${1}/ui/"
      - "traefik.http.routers.index.rule=Path(`/`)"
      - "traefik.http.routers.index.middlewares=index-redirect@docker"
      - "traefik.http.routers.index.service=index"
      - "traefik.http.routers.index.entrypoints=web"
      - "traefik.http.services.index.loadbalancer.server.port=8080"
      - "traefik.http.services.index.loadbalancer.server.scheme=http"
      - "traefik.expose=true"
    networks:
      - reportportal
    restart: always

  rp-ui:
    image: reportportal/service-ui:5.15.1
    environment:
      RP_SERVER_PORT: "8080"
    labels:
      - "traefik.http.middlewares.ui-strip-prefix.stripprefix.prefixes=/ui"
      - "traefik.http.routers.ui.middlewares=ui-strip-prefix@docker"
      - "traefik.http.routers.ui.rule=PathPrefix(`/ui`)"
      - "traefik.http.routers.ui.service=ui"
      - "traefik.http.routers.ui.entrypoints=web"
      - "traefik.http.routers.ui.priority=10"
      - "traefik.http.routers.ui-assets.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui-assets.service=ui"
      - "traefik.http.routers.ui-assets.entrypoints=web"
      - "traefik.http.routers.ui-assets.priority=2"
      - "traefik.http.services.ui.loadbalancer.server.port=8080"
      - "traefik.http.services.ui.loadbalancer.server.scheme=http"
      - "traefik.expose=true"
    networks:
      - reportportal
    restart: always

  rp-api:
    image: reportportal/service-api:5.15.0
    depends_on:
      rp-rabbitmq:
        condition: service_healthy
      rp-gateway:
        condition: service_started
      rp-postgres:
        condition: service_healthy
      rp-jobs:
        condition: service_healthy
    environment:
      <<: *rp-common-environment
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: info
      MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED: "false"
      RP_REQUESTLOGGING: "false"
      JAVA_OPTS: -Xmx1g
      RP_JOBS_BASEURL: http://rp-jobs:8686
      REPORTING_QUEUES_COUNT: 10
      REPORTING_CONSUMER_PREFETCHCOUNT: 10
      REPORTING_PARKINGLOT_TTL_DAYS: 7
    volumes:
      - rp_storage:/data/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8585/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.http.middlewares.api-strip-prefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip-prefix@docker"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8585"
      - "traefik.http.services.api.loadbalancer.server.scheme=http"
      - "traefik.expose=true"
    networks:
      - reportportal
    restart: always

  rp-uat:
    image: reportportal/service-authorization:5.15.0
    depends_on:
      rp-postgres:
        condition: service_healthy
    environment:
      <<: *rp-common-environment
      RP_SESSION_LIVE: 86400
      RP_INITIAL_ADMIN_PASSWORD: admin
      JAVA_OPTS: >
        -Djava.security.egd=file:/dev/./urandom
        -XX:MinRAMPercentage=60.0
        -XX:MaxRAMPercentage=90.0
        --add-opens=java.base/java.lang=ALL-UNNAMED
    volumes:
      - rp_storage:/data/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.http.middlewares.uat-strip-prefix.stripprefix.prefixes=/uat"
      - "traefik.http.routers.uat.middlewares=uat-strip-prefix@docker"
      - "traefik.http.routers.uat.rule=PathPrefix(`/uat`)"
      - "traefik.http.routers.uat.service=uat"
      - "traefik.http.routers.uat.entrypoints=web"
      - "traefik.http.services.uat.loadbalancer.server.port=9999"
      - "traefik.http.services.uat.loadbalancer.server.scheme=http"
      - "traefik.expose=true"
    networks:
      - reportportal
    restart: always

  rp-jobs:
    image: reportportal/service-jobs:5.15.0
    depends_on:
      rp-rabbitmq:
        condition: service_healthy
      rp-gateway:
        condition: service_started
      rp-postgres:
        condition: service_healthy
    environment:
      <<: *rp-common-environment
      RP_ENVIRONMENT_VARIABLE_CLEAN_ATTACHMENT_CRON: 0 0 */24 * * *
      RP_ENVIRONMENT_VARIABLE_CLEAN_LOG_CRON: 0 0 */24 * * *
      RP_ENVIRONMENT_VARIABLE_CLEAN_LAUNCH_CRON: 0 0 */24 * * *
      RP_ENVIRONMENT_VARIABLE_CLEAN_STORAGE_CRON: 0 0 */24 * * *
      RP_ENVIRONMENT_VARIABLE_STORAGE_PROJECT_CRON: 0 */5 * * * *
      JAVA_OPTS: -Xmx512m
    volumes:
      - rp_storage:/data/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8686/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.http.middlewares.jobs-strip-prefix.stripprefix.prefixes=/jobs"
      - "traefik.http.routers.jobs.middlewares=jobs-strip-prefix@docker"
      - "traefik.http.routers.jobs.rule=PathPrefix(`/jobs`)"
      - "traefik.http.routers.jobs.service=jobs"
      - "traefik.http.routers.jobs.entrypoints=web"
      - "traefik.http.services.jobs.loadbalancer.server.port=8686"
      - "traefik.http.services.jobs.loadbalancer.server.scheme=http"
      - "traefik.expose=true"
    networks:
      - reportportal
    restart: always

volumes:
  mysql_data:
  rp_postgres:
  rp_storage:

networks:
  reportportal:

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/users/**
            - id: portfolio-service
              uri: http://portfolio-service:8082
              predicates:
                - Path=/portfolio/**
            - id: market-service
              uri: http://market-service:8083
              predicates:
                - Path=/market/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
